<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{AGENT_NAME} API — Mock</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css"
    />
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
      .forge-banner {
        background: #0f172a;
        color: #e2e8f0;
        padding: 12px 24px;
        border-bottom: 2px solid #334155;
      }
      .forge-banner h1 {
        margin: 0 0 4px 0;
        font-size: 18px;
        font-weight: 600;
      }
      .forge-banner p {
        margin: 0;
        font-size: 13px;
        color: #94a3b8;
      }
      .forge-banner code {
        background: #1e293b;
        padding: 1px 6px;
        border-radius: 3px;
        font-size: 12px;
      }
      #swagger-ui { padding-top: 8px; }
    </style>
  </head>
  <body>
    <div class="forge-banner">
      <h1>{AGENT_NAME} API</h1>
      <p>
        Mock — try-it-out disabled. This is the design contract. Edit
        <code>openapi.yaml</code> and refresh to iterate. After approval this
        file ships in the produced project root as the production contract.
      </p>
    </div>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js" crossorigin></script>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js" crossorigin></script>
    <script>
      window.addEventListener("load", function () {
        window.ui = SwaggerUIBundle({
          url: "./openapi.yaml",
          dom_id: "#swagger-ui",
          presets: [
            SwaggerUIBundle.presets.apis,
            SwaggerUIStandalonePreset,
          ],
          layout: "BaseLayout",
          deepLinking: true,
          docExpansion: "list",
          defaultModelsExpandDepth: 1,
          defaultModelExpandDepth: 2,
          supportedSubmitMethods: [],
        });
      });
    </script>
  </body>
</html>
