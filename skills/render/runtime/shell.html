<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}}</title>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel: in-browser JSX transpilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* ---- Reset & Base ---- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      line-height: 1.6;
      min-height: 100vh;
    }

    code, pre {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    /* ---- Markdown Styles ---- */
    .markdown h1, .markdown h2, .markdown h3 { margin: 1em 0 0.5em; color: #f5f5f5; }
    .markdown h1 { font-size: 1.5em; }
    .markdown h2 { font-size: 1.25em; }
    .markdown h3 { font-size: 1.1em; }
    .markdown p { margin: 0.5em 0; }
    .markdown ul, .markdown ol { margin: 0.5em 0; padding-left: 1.5em; }
    .markdown li { margin: 0.25em 0; }
    .markdown code {
      background: #1e1e1e;
      padding: 0.15em 0.4em;
      border-radius: 3px;
      font-size: 0.9em;
    }
    .markdown pre {
      background: #111;
      padding: 1em;
      border-radius: 6px;
      overflow-x: auto;
      margin: 0.75em 0;
    }
    .markdown pre code { background: none; padding: 0; }
    .markdown a { color: #60a5fa; text-decoration: none; }
    .markdown a:hover { text-decoration: underline; }
    .markdown blockquote {
      border-left: 3px solid #333;
      padding-left: 1em;
      color: #a3a3a3;
      margin: 0.75em 0;
    }

    /* ---- Thinking Indicator ---- */
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }
    .thinking-dots span {
      display: inline-block;
      width: 8px; height: 8px;
      margin: 0 3px;
      background: #60a5fa;
      border-radius: 50%;
      animation: pulse 1.4s infinite ease-in-out;
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

    /* AGENT: styles */
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ---- State Bridge ----
    // Connects to SSE and provides live state to all components.
    function useAppState() {
      const [state, setState] = useState(null);

      useEffect(() => {
        fetch('/state.json')
          .then((r) => r.json())
          .then(setState)
          .catch(() => {});

        const es = new EventSource('/events');
        es.onmessage = (e) => {
          try {
            setState(JSON.parse(e.data));
          } catch {}
        };
        return () => es.close();
      }, []);

      return state;
    }

    // ---- Send Input to Agent ----
    // POSTs data to the server, which prints it to stdout for the agent.
    async function sendInput(data) {
      try {
        await fetch('/input', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
      } catch (err) {
        console.error('Failed to send input:', err);
      }
    }

    // ---- Markdown Renderer ----
    function Markdown({ content }) {
      if (!content) return null;
      const html = marked.parse(content);
      return (
        <div
          className="markdown"
          dangerouslySetInnerHTML={{ __html: html }}
        />
      );
    }

    // ---- Thinking Indicator ----
    function ThinkingIndicator() {
      return (
        <div className="thinking-dots">
          <span /><span /><span />
        </div>
      );
    }

    // ---- Loading Screen ----
    function Loading() {
      return (
        <div style={{
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          height: '100vh',
          color: '#666',
        }}>
          Connecting...
        </div>
      );
    }

    // ==================================================
    // AGENT: Insert experience-specific components below.
    //
    // Available utilities:
    //   useAppState()     — returns current state (auto-updates via SSE)
    //   sendInput(data)   — sends data to agent via stdout
    //   <Markdown />      — renders markdown content
    //   <ThinkingIndicator /> — pulsing dots for loading state
    //   <Loading />       — initial connection screen
    //
    // Your top-level component must be called App.
    // ==================================================

    {/* AGENT: components */}

    // ---- Mount ----
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
